<!DOCTYPE html>
<html>
<head>
    <style>

        .button 
        {
            border: none;
            color:Black;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
        }
        .loginButton {background-color: #50fa7b;}
        .center 
        {
            margin: 0;
            position: absolute;
            top: 30%;
            left: 50%;
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
        }

        body
        {
            background-color: #282a36;
        }
        footer
        {
            position: fixed;
            bottom: 0;
            text-align: center;
            padding: 2px;
            background-color: #282a36 ;
            color: #ff5555 ;
        }
        a:link
        {
            color:#ff5555;
            background-color: transparent;
            text-decoration: none;
        }
        a:visited
        {
            color:#ff55555d;
            background-color: transparent;
            text-decoration: none;
        }
        a:hover
        {
            color:#f73939;
            background-color: transparent;
            text-decoration: none;
        }

    
    </style>
</head>
<body>
    <div class="center">
        <button type="submit" class="button loginButton" id="loginButton">Login with Spotify</button>
      </div>
    <footer>
        <p>Written by Jared See<br>
        <a href="jareds2147@gmail.com">jareds2147@gmail.com</a></p>
    </footer>
    <script type="text/javascript" src="java/src/login.js"></script>
</body>
</html>
